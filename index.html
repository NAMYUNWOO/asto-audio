<!doctype html>
<html lang="en-us">
  <head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0805">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>어스토니시아 사운드 · Astonishia Audio</title>
<style id="asto-skin">
  @font-face { font-family:'neodgm'; src:url('neodgm.ttf') format('truetype'); font-display:swap; }
  html, body { margin:0; padding:0; height:100%; background:#0a0805; overflow:hidden;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; }
  h1, footer, .emscripten_border { display:none !important; }
  #canvas {
    position:fixed !important; top:0; left:0;
    width:100vw !important; height:100vh !important; height:100dvh !important;
    margin:0 !important; display:block; outline:none; background:#0a0805;
    object-fit:contain; image-rendering:pixelated; image-rendering:crisp-edges;
  }
  #asto-start {
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center;
    background:radial-gradient(circle at 50% 38%, #241a0e 0%, #0a0805 75%);
    color:#e8d9a8; font-family:'neodgm', monospace;
  }
  #asto-start.hidden { display:none; }
  #asto-start .title { font-size:clamp(22px,6vw,40px); color:#d8a94a; letter-spacing:2px;
    text-shadow:0 2px 0 #5a3d12; }
  #asto-start .sub { font-size:clamp(12px,3.4vw,16px); color:#9a8f78; }
  #asto-start .btn { margin-top:10px; padding:14px 30px; border:2px solid #b8862f;
    border-radius:12px; background:#1a140c; color:#f0e4bf; cursor:pointer;
    font-size:clamp(16px,4.6vw,21px); box-shadow:0 4px 0 #3a2a10; }
  #asto-start .btn:active { transform:translateY(2px); box-shadow:0 2px 0 #3a2a10; }
</style>

    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1">
    <title>Astonishia Audio</title>

    <!-- Load custom style sheet -->
    <link rel="stylesheet" type="text/css" href="theme/love.css">
  </head>
  <body>
    <center>
      <div>
        <h1>Astonishia Audio</h1>
        <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600"></canvas>
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
      </div>
    </center>

    <script type='text/javascript'>
      function goFullScreen(){
            var canvas = document.getElementById("canvas");
            if(canvas.requestFullScreen)
                canvas.requestFullScreen();
            else if(canvas.webkitRequestFullScreen)
                canvas.webkitRequestFullScreen();
            else if(canvas.mozRequestFullScreen)
                canvas.mozRequestFullScreen();
      }
      function FullScreenHook(){
        var canvas = document.getElementById("canvas");
        canvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
        canvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
      }
      var loadingContext = document.getElementById('loadingCanvas').getContext('2d');
      function drawLoadingText(text) {
        var canvas = loadingContext.canvas;

        loadingContext.fillStyle = "rgb(142, 195, 227)";
        loadingContext.fillRect(0, 0, canvas.scrollWidth, canvas.scrollHeight);

        loadingContext.font = '2em arial';
        loadingContext.textAlign = 'center'
        loadingContext.fillStyle = "rgb( 11, 86, 117 )";
        loadingContext.fillText(text, canvas.scrollWidth / 2, canvas.scrollHeight / 2);

        loadingContext.fillText("Powered By Emscripten.", canvas.scrollWidth / 2, canvas.scrollHeight / 4);
        loadingContext.fillText("Powered By LÖVE.", canvas.scrollWidth / 2, canvas.scrollHeight / 4 * 3);
      }

      window.onload = function () { window.focus(); };
      window.onclick = function () { window.focus(); };

      window.addEventListener("keydown", function(e) {
        // space and arrow keys
        if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
          e.preventDefault();
        }
      }, false);

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 268435456,
        printErr: console.error.bind(console),
        canvas: (function() {
          var canvas = document.getElementById('canvas');

          // As a default initial behavior, pop up an alert when webgl context is lost. To make your
          // application robust, you may want to override this behavior before shipping!
          // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);

          return canvas;
        })(),
        setStatus: function(text) {
          if (text) {
            drawLoadingText(text);
          } else if (Module.remainingDependencies === 0) {
            document.getElementById('loadingCanvas').style.display = 'none';
            document.getElementById('canvas').style.visibility = 'visible';
          }
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function(left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = function(event) {
        // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function(text) {
          if (text) Module.printErr('[post-exception status] ' + text);
        };
      };

      var applicationLoad = function(e) {
        Love(Module);
      }
    </script>
    <script type="text/javascript" src="game.js"></script>
    <script async type="text/javascript" src="love.js" onload="applicationLoad(this)"></script>
    <footer>
      <p>Built with <a href="https://github.com/Davidobot/love.js">love.js</a> <button onclick="goFullScreen();">Go Fullscreen</button><br>Hint: Reload the page if screen is blank</p>
    </footer>
  
<div id="asto-start">
  <div class="title">어스토니시아 사운드</div>
  <div class="sub">Astonishia Story &middot; BGM Player</div>
  <button class="btn" id="asto-start-btn">&#9654; 탭하여 시작 / Tap to start</button>
  <div class="sub">PC: &uarr;&darr; Enter / Space &middot; 모바일: 터치로 선택&middot;재생</div>
</div>
<script>
(function () {
  var ov = document.getElementById('asto-start');
  function start() { if (ov) ov.classList.add('hidden'); }
  var btn = document.getElementById('asto-start-btn');
  if (btn) btn.addEventListener('click', start);
  if (ov) ov.addEventListener('click', start);
  // block pinch / double-tap zoom on mobile
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
  var lastTouch = 0;
  document.addEventListener('touchend', function (e) {
    var now = Date.now();
    if (now - lastTouch < 320) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
})();
</script>
</body>
</html>
